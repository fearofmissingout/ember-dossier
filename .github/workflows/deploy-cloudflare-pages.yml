name: Deploy Cloudflare Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Sync Cloudflare Pages runtime secrets
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          clean_secret() {
            python3 -c 'import sys; print(sys.stdin.read().lstrip("\ufeff").strip(), end="")'
          }
          export CLOUDFLARE_API_TOKEN="$(printf '%s' "$CLOUDFLARE_API_TOKEN" | clean_secret)"
          printf '%s' "$VITE_SUPABASE_URL" | clean_secret | npx wrangler pages secret put SUPABASE_URL --project-name=ember-dossier
          printf '%s' "$VITE_SUPABASE_PUBLISHABLE_KEY" | clean_secret | npx wrangler pages secret put SUPABASE_PUBLISHABLE_KEY --project-name=ember-dossier

      - name: Build Cloudflare Pages Functions
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages functions build functions --outdir dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Place Pages worker in asset output
        run: mv dist/index.js dist/_worker.js

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=ember-dossier --branch=master --no-bundle
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Production playtest smoke
        run: npm run playtest:check
